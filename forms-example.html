<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Feedback Form</title>
</head>

<body>
    <main>
        <a href="index.html">Back to Homepage</a>

        <h1>Example: Hotel Feedback Form</h1>    

        <form action="https://hotel-feedback.freecodecamp.org" method="POST">

            <fieldset>
                <legend>Personal Information</legend>

                <label for="full-name">Name (required):</label>
                <input type="text" id="full-name" name="name" placeholder="Enter your name" size="20" required>

                <label for="email">Email Address (required):</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" size="20" required>

                <label for="age">Age (optional):</label>
                <input type="number" id="age" name="age" min="3" max="100">
            </fieldset>

            <br>

            <fieldset>
                <legend>Was this your first time at our hotel?</legend>

                <input type="radio" id="yes-option" name="hotel-stay" value="yes">
                <label for="yes-option">Yes</label>

                <input type="radio" id="no-option" name="hotel-stay" value="no">
                <label for="no-option">No</label>
            </fieldset>

            <br>

            <fieldset>
                <legend>Why did you choose to stay at our hotel? (Check all that apply)</legend>

                <input checked type="checkbox" id="ads" value="ads" name="choice">
                <label for="ads">Social Media Ads</label>

                <input type="checkbox" id="recommendation" name="choice" value="recommendation">
                <label for="recommendation">Personal Recommendation</label>

                <input type="checkbox" id="location" value="location" name="choice">
                <label for="location">Location</label>

                <input type="checkbox" id="reputation" name="choice" value="reputation">
                <label for="reputation">Reputation</label>
            </fieldset>

            <br>

            <fieldset>
                <legend>How was the service?</legend>

                <label for="service">How was the service?</label>
                <select id="service" name="service">
                    <option value="poor">Poor</option>
                    <option value="satisfactory">Satisfactory</option>
                    <option value="good">Good</option>
                    <option value="very-good">Very Good</option>
                    <option selected value="excellent">Excellent</option>
                </select>
            </fieldset>

            <br>

            <label for="comments">Other Comments?</label>
            <br>
            <textarea id="comments" name="comments" cols="30" rows="10"></textarea>

            <br><br>

            <button type="submit">Submit</button>

        </form>

    </main>
</body>
</html>
