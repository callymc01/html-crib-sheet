<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tables Example</title>
</head>

<body>

    <p><a href="index.html">Back to Homepage</a></p>

    <h1>Tables Example</h1>

    <section>

        <p>This example shows a simple table with a header, body, and footer.</p>

       <table>
            <caption>Pets</caption>
            <thead>
                <tr>
                    <!--Column Headers-->
                    <th scope="col">Name</th>
                    <th scope="col">Type</th>
                    <th scope="col">Colour</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th scope="row">Frank</th><!--Row header-->
                    <td>Dog</td>
                    <td>Brown</td>            
                </tr>
                <tr>
                    <th scope="row">Jasper</th>
                    <td>Cat</td>
                    <td>Ginger</td>               
                </tr>
                <tr>
                    <th scope="row">Izzy</th>
                    <td>Cat</td>
                    <td>White</td>             
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <th>Footer including date of publication, or some other stuff</th>
                </tr>
            </tfoot>
        </table>

    </section>

</body>
</html>
