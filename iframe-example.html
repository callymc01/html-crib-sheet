<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iframe Element Example</title>
</head>

<body>

    <p><a href="index.html">Back to Homepage</a></p>

    <h1>Example: Iframe Element</h1>

    <section>
        <p>This example shows how to embed external content — in this case, a YouTube video — using the <code>&lt;iframe&gt;</code> element.</p>

        <iframe 
            src="https://www.youtube.com/embed/I0_951_MPE0"
            width="560"
            height="310"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
    </section>

</body>
</html>
